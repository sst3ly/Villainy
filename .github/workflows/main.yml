name: Villainy Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build
      
      - name: Install build dependencies (MacOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Setup Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install -y vulkan-sdk
      
      - name: Setup Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          $ver = "1.4.341.1"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkansdk-windows-X64-$ver.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          .\VulkanSDK.exe /S
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
        
      - name: Setup Vulkan SDK (MacOS)
        if: runner.os == 'macOS'
        run: |
          $ver = "1.4.341.1"
          wget https://sdk.lunarg.com/sdk/download/$ver/mac/vulkansdk-macos-$ver.zip
          unzip vulkansdk-macos-$ver.zip -d ~/VulkanSDK
          sudo ~/VulkanSDK/vulkansdk-macos-$ver/InstallVulkan.app/Contents/MacOS/InstallVulkan --root ~/VulkanSDK --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=$HOME/VulkanSDK/macOS" >> $GITHUB_ENV
      
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release