name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: (Linux) Install dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libvulkan-dev vulkan-validationlayers-dev

      # ── macOS ────────────────────────────────────────────────────────────────
      - name: (macOS) Install Vulkan SDK
        if: runner.os == 'macOS'
        run: |
          brew install glfw
          # Install Vulkan SDK via LunarG .dmg
          VULKAN_SDK_VERSION="1.3.296.0"
          curl -L -o vulkansdk.dmg \
            "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/mac/vulkansdk-macos-${VULKAN_SDK_VERSION}.dmg"
          hdiutil attach vulkansdk.dmg -mountpoint /Volumes/vulkansdk -nobrowse
          sudo /Volumes/vulkansdk/InstallVulkan.app/Contents/MacOS/InstallVulkan \
            --root ~/VulkanSDK/${VULKAN_SDK_VERSION} \
            --accept-licenses --default-answer --confirm-command install
          hdiutil detach /Volumes/vulkansdk
          echo "VULKAN_SDK=$HOME/VulkanSDK/${VULKAN_SDK_VERSION}/macOS" >> $GITHUB_ENV
          echo "$HOME/VulkanSDK/${VULKAN_SDK_VERSION}/macOS/bin" >> $GITHUB_PATH

      # ── Windows ──────────────────────────────────────────────────────────────
      - name: (Windows) Install Vulkan SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VULKAN_SDK_VERSION = "1.3.296.0"
          $installer = "VulkanSDK-$VULKAN_SDK_VERSION-Installer.exe"
          Invoke-WebRequest `
            -Uri "https://sdk.lunarg.com/sdk/download/$VULKAN_SDK_VERSION/windows/$installer" `
            -OutFile $installer
          Start-Process -FilePath ".\$installer" `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait
          $sdkPath = "C:\VulkanSDK\$VULKAN_SDK_VERSION"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: (Windows) Install GLFW via vcpkg
        if: runner.os == 'Windows'
        run: vcpkg install glfw3:x64-windows

      # ── Configure ────────────────────────────────────────────────────────────
      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: villainy-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            build/bin/
            build/lib/
            build/villainy
            build/villainy.exe
          if-no-files-found: ignore