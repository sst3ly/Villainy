name: Build Villainy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libglfw3-dev libvulkan-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install glfw molten-vk vulkan-headers
          echo "VULKAN_SDK=/opt/homebrew" >> $GITHUB_ENV

      - name: Install GLFW (Windows)
        if: runner.os == 'Windows'
        run: C:\vcpkg\vcpkg.exe install glfw3:x64-windows

      - name: Install Vulkan (Windows)
        if: runner.os == 'Windows'
        uses: jakoch/install-vulkan-sdk-action@v1.0.4

      - name: Configure (macOS/Linux)
        if: runner.os == 'macOS' || runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libVillainyLib-${{ runner.os }}
          path: |
            build/**/*.a
            build/**/*.lib